    seconds: 1296000 # 15天
    # seconds: 8640000  100天改成30天
  jwtSecret: (Match:)_$^11244^%$_(Chris:)_@@++--(Angela:)_++++_.sds_(Mia:)


server:
  port: 8080
  address: 0.0.0.0
  tomcat:
    max-connections: 10000 #最大连接数
    threads:
      max: 3000 #最大线程数
    accept-count: 10000 #容纳的最大用户数
  servlet:
    context-path: /


